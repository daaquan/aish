name: ci
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout plugins registry
        uses: actions/checkout@v4
        with:
          repository: daaquan/aish-plugins
          ref: v0.2.0
          path: aish-plugins
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
        env:
          AISH_PLUGINS_DIR: ${{ github.workspace }}/aish-plugins

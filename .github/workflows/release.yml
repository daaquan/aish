name: release

# Build prebuilt binaries for every platform the installer (openaish.com/install.sh)
# knows about, and attach them to the GitHub release. Asset names MUST match the
# installer's `aish-${arch}-${os}` scheme.
#
# Linux builds use `cross` with musl targets: the binary is statically linked, so a
# single artifact runs on any distro (CentOS, Ubuntu, ...) regardless of glibc version,
# and no target hardware is needed for aarch64 (cross builds it in a Docker container).
# macOS builds run natively on the matching runner.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and upload assets for"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: aish-x86_64-linux
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: aish-aarch64-linux
            use_cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            asset: aish-x86_64-darwin
            use_cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            asset: aish-aarch64-darwin
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage asset
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/aish" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"

      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" "${{ matrix.asset }}" --clobber

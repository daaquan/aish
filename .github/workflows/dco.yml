name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco-check:
    name: Verify Signed-off-by
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR commits
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Ensure every commit is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            if ! git show -s --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by line (use: git commit -s)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more commits are not DCO signed. See CONTRIBUTING.md."
            exit 1
          fi
          echo "All commits are DCO signed."

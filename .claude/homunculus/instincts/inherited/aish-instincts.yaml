# Aish Workflow Project Governance Foundation Update

## Action

Follow the project-governance-foundation-update workflow:
1. Add or update LICENSE file
2. Add or update CODE_OF_CONDUCT.md
3. Add or update CONTRIBUTING.md
4. Add or update PR and issue templates in .github/ISSUE_TEMPLATE/ and .github/PULL_REQUEST_TEMPLATE.md
5. Update README.md and CLAUDE.md to reflect governance changes
6. Add or update governance design spec in docs/superpowers/specs/
7. Optionally add or update workflow files in .github/workflows/

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: LICENSE, CODE_OF_CONDUCT.md, CONTRIBUTING.md

